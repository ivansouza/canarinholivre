<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 600" width="500" height="600">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="100%" style="stop-color:#FFB800"/>
    </linearGradient>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#009c3b"/>
      <stop offset="100%" style="stop-color:#007a2e"/>
    </linearGradient>
  </defs>

  <!-- 5 Estrelas (verde escuro, arco no topo) -->
  <g fill="#003319">
    <!-- Estrela central (maior) -->
    <polygon points="250,38 258,62 284,62 263,77 270,102 250,87 230,102 237,77 216,62 242,62"/>
    <!-- Estrela esquerda 1 (média) -->
    <polygon points="195,48 202,68 224,68 207,80 213,102 195,90 177,102 183,80 166,68 188,68"/>
    <!-- Estrela direita 1 (média) -->
    <polygon points="305,48 312,68 334,68 317,80 323,102 305,90 287,102 293,80 276,68 298,68"/>
    <!-- Estrela esquerda 2 (menor) -->
    <polygon points="150,60 156,76 174,76 160,86 165,104 150,94 135,104 140,86 126,76 144,76"/>
    <!-- Estrela direita 2 (menor) -->
    <polygon points="350,60 356,76 374,76 360,86 365,104 350,94 335,104 340,86 326,76 344,76"/>
  </g>

  <!-- Escudo verde -->
  <path d="M250 80 
           C220 80 200 90 180 100
           C160 110 140 130 120 160
           C100 190 85 230 80 270
           C75 310 78 350 90 380
           C100 405 120 425 145 440
           C170 455 200 465 230 470
           C240 472 250 475 250 480
           C250 475 260 472 270 470
           C300 465 330 455 355 440
           C380 425 400 405 410 380
           C422 350 425 310 420 270
           C415 230 400 190 380 160
           C360 130 340 110 320 100
           C300 90 280 80 250 80Z"
        fill="url(#shieldGrad)" stroke="#003319" stroke-width="6"/>

  <!-- Borda interna do escudo -->
  <path d="M250 95 
           C225 95 208 103 192 112
           C175 122 158 140 140 168
           C122 196 108 232 103 268
           C98 304 100 340 110 370
           C118 392 135 412 158 426
           C180 440 208 450 235 455
           C242 456 250 458 250 462
           C250 458 258 456 265 455
           C292 450 320 440 342 426
           C365 412 382 392 390 370
           C400 340 402 304 397 268
           C392 232 378 196 360 168
           C342 140 325 122 308 112
           C292 103 275 95 250 95Z"
        fill="none" stroke="#00b84a" stroke-width="2" opacity="0.4"/>

  <!-- Canarinho -->
  <g transform="translate(250, 290)">
    <!-- Rabo (atrás do corpo, saindo do escudo) -->
    <path d="M-60,40 Q-100,60 -130,90 Q-120,100 -100,95 Q-80,90 -65,70 Z" fill="#FFB800" stroke="#003319" stroke-width="2.5"/>
    <path d="M-55,50 Q-90,75 -115,105 Q-105,112 -90,108 Q-75,102 -60,80 Z" fill="#FFA000" stroke="#003319" stroke-width="2"/>
    <path d="M-50,60 Q-80,85 -95,115 Q-85,120 -75,115 Q-65,108 -55,90 Z" fill="#FF8F00" stroke="#003319" stroke-width="2"/>

    <!-- Perna esquerda -->
    <path d="M-15,95 L-25,125" stroke="#003319" stroke-width="4" stroke-linecap="round"/>
    <path d="M-35,128 L-25,125 L-18,128" stroke="#003319" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Perna direita -->
    <path d="M15,95 L20,125" stroke="#003319" stroke-width="4" stroke-linecap="round"/>
    <path d="M10,128 L20,125 L28,128" stroke="#003319" stroke-width="3" fill="none" stroke-linecap="round"/>

    <!-- Corpo principal -->
    <ellipse cx="0" cy="20" rx="65" ry="75" fill="url(#bodyGrad)" stroke="#003319" stroke-width="3"/>

    <!-- Peito estufado -->
    <ellipse cx="-15" cy="35" rx="50" ry="55" fill="#FFD700"/>
    
    <!-- Sombra da barriga -->
    <ellipse cx="-10" cy="50" rx="35" ry="35" fill="#FFB800" opacity="0.5"/>

    <!-- Cabeça -->
    <circle cx="25" cy="-30" r="40" fill="url(#bodyGrad)" stroke="#003319" stroke-width="3"/>

    <!-- Topete/crista -->
    <path d="M5,-60 Q15,-80 30,-70 Q35,-85 45,-70 Q50,-80 55,-65"
          fill="none" stroke="#003319" stroke-width="3" stroke-linecap="round"/>
    <path d="M10,-58 Q18,-72 28,-65 Q32,-76 40,-65"
          fill="none" stroke="#FFB800" stroke-width="2" stroke-linecap="round"/>

    <!-- Olho -->
    <circle cx="42" cy="-35" r="8" fill="#003319"/>
    <circle cx="45" cy="-38" r="3" fill="white"/>

    <!-- Bico -->
    <path d="M60,-25 L85,-18 L60,-12 Z" fill="#003319"/>
    <path d="M60,-22 L78,-18 L60,-15 Z" fill="#333"/>

    <!-- Asa -->
    <path d="M30,0 Q70,20 65,60 Q60,80 40,85 Q20,88 15,65 Q10,45 20,20 Z"
          fill="#FFB800" stroke="#003319" stroke-width="3"/>
    
    <!-- Detalhes da asa (penas) -->
    <path d="M25,15 Q55,30 55,55" fill="none" stroke="#003319" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M22,30 Q48,42 48,62" fill="none" stroke="#003319" stroke-width="2" stroke-linecap="round"/>
    <path d="M20,45 Q40,55 40,72" fill="none" stroke="#003319" stroke-width="2" stroke-linecap="round"/>
    <path d="M18,58 Q32,65 32,78" fill="none" stroke="#003319" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Detalhes do corpo (penas do peito) -->
    <path d="M-30,20 Q-20,25 -10,20" fill="none" stroke="#FFA000" stroke-width="1.5" opacity="0.6"/>
    <path d="M-35,35 Q-25,40 -15,35" fill="none" stroke="#FFA000" stroke-width="1.5" opacity="0.6"/>
    <path d="M-32,50 Q-22,55 -12,50" fill="none" stroke="#FFA000" stroke-width="1.5" opacity="0.6"/>

    <!-- Sombra sob a asa -->
    <path d="M25,10 Q50,25 50,50 Q45,65 35,70 Q25,72 22,55 Q20,35 25,10 Z"
          fill="#FF8F00" opacity="0.3"/>
  </g>

  <!-- Faixa "CANARINHO LIVRE" na base -->
  <g transform="translate(250, 530)">
    <rect x="-145" y="-18" width="290" height="36" rx="6" fill="#009c3b" stroke="#003319" stroke-width="3"/>
    <text x="0" y="6" text-anchor="middle" font-family="Arial Black, Impact, sans-serif"
          font-size="16" font-weight="900" fill="#FFD700" letter-spacing="4">
      CANARINHO LIVRE
    </text>
  </g>
</svg>
