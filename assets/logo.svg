<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <!-- Escudo verde -->
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a6b2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d4a1e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="canaryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdd835;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f9a825;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Escudo -->
  <path d="M200 30 L340 30 L340 200 Q340 340 200 430 Q60 340 60 200 L60 30 Z"
        fill="url(#shieldGrad)" stroke="#0d4a1e" stroke-width="4"/>

  <!-- Borda interna do escudo -->
  <path d="M200 45 L325 45 L325 195 Q325 325 200 410 Q75 325 75 195 L75 45 Z"
        fill="none" stroke="#2ecc71" stroke-width="2" opacity="0.5"/>

  <!-- 5 Estrelas acima -->
  <g fill="#fdd835" transform="translate(200, 65)">
    <!-- Estrela central -->
    <polygon points="0,-18 4,-6 17,-6 7,3 11,16 0,8 -11,16 -7,3 -17,-6 -4,-6" />
    <!-- Estrela esquerda 1 -->
    <polygon points="-40,-15 -37,-5 -26,-5 -34,2 -31,13 -40,6 -49,13 -46,2 -54,-5 -43,-5" />
    <!-- Estrela direita 1 -->
    <polygon points="40,-15 37,-5 26,-5 34,2 31,13 40,6 49,13 46,2 54,-5 43,-5" />
    <!-- Estrela esquerda 2 -->
    <polygon points="-70,-10 -68,-2 -58,-2 -65,4 -62,13 -70,7 -78,13 -75,4 -82,-2 -72,-2" />
    <!-- Estrela direita 2 -->
    <polygon points="70,-10 68,-2 58,-2 65,4 62,13 70,7 78,13 75,4 82,-2 72,-2" />
  </g>

  <!-- Canarinho -->
  <g transform="translate(200, 240)">
    <!-- Corpo -->
    <ellipse cx="0" cy="30" rx="55" ry="65" fill="url(#canaryGrad)"/>

    <!-- Peito estufado -->
    <ellipse cx="-15" cy="45" rx="40" ry="50" fill="#fdd835"/>

    <!-- Cabeça -->
    <circle cx="20" cy="-20" r="35" fill="url(#canaryGrad)"/>

    <!-- Olho -->
    <circle cx="35" cy="-25" r="6" fill="#1a1a1a"/>
    <circle cx="37" cy="-27" r="2.5" fill="white"/>

    <!-- Bico -->
    <path d="M50,-15 L70,-10 L50,-5 Z" fill="#e65100"/>

    <!-- Topete/crista -->
    <path d="M5,-50 Q10,-65 20,-55 Q25,-70 35,-55 Q40,-65 45,-50"
          fill="none" stroke="#f9a825" stroke-width="3" stroke-linecap="round"/>

    <!-- Asa -->
    <path d="M30,10 Q60,30 50,70 Q40,80 20,75 Q10,70 15,50 Z"
          fill="#f9a825" stroke="#f57f17" stroke-width="1.5"/>

    <!-- Detalhe da asa -->
    <path d="M25,20 Q45,35 40,60" fill="none" stroke="#f57f17" stroke-width="1.5" opacity="0.6"/>

    <!-- Rabo -->
    <path d="M-45,60 L-75,85 L-65,90 L-40,70 Z" fill="#f9a825"/>
    <path d="M-40,65 L-70,95 L-58,98 L-35,75 Z" fill="#f57f17" opacity="0.7"/>

    <!-- Perna esquerda -->
    <line x1="-10" y1="90" x2="-15" y2="115" stroke="#e65100" stroke-width="3" stroke-linecap="round"/>
    <path d="M-20,115 L-15,115 L-10,115" stroke="#e65100" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Perna direita -->
    <line x1="10" y1="90" x2="15" y2="115" stroke="#e65100" stroke-width="3" stroke-linecap="round"/>
    <path d="M10,115 L15,115 L20,115" stroke="#e65100" stroke-width="2" fill="none" stroke-linecap="round"/>

    <!-- Detalhe da barriga -->
    <ellipse cx="-10" cy="50" rx="25" ry="30" fill="#ffee58" opacity="0.4"/>
  </g>

  <!-- Faixa "CANARINHO LIVRE" -->
  <g transform="translate(200, 460)">
    <rect x="-120" y="-15" width="240" height="30" rx="5" fill="#1a6b2e" stroke="#fdd835" stroke-width="1.5"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial Black, Arial, sans-serif"
          font-size="14" font-weight="900" fill="#fdd835" letter-spacing="3">
      CANARINHO LIVRE
    </text>
  </g>
</svg>
